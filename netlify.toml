# Netlify Configuration for Frontend Deployment

[build]
  publish = "templates"
  command = "echo 'Static site - no build needed'"

# Environment variables for frontend
[build.environment]
  NODE_ENV = "production"

# Redirects - route all requests to login for SPA routing
[[redirects]]
  from = "/*"
  to = "/login.html"
  status = 200
  condition = "!req.headers.Accept || req.headers.Accept.includes('text/html')"

# Exception: Don't redirect api calls or static assets
[[redirects]]
  from = "/api/*"
  to = ":splat"
  status = 200
  force = true

[[redirects]]
  from = "/static/*"
  to = ":splat"
  status = 200
  force = true

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache headers for assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
