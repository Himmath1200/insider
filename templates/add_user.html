{% extends "base.html" %}

{% block title %}Add User - Insider Threat Detection{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1 class="fw-bold mb-4"><i class="fas fa-user-plus"></i> Add New User</h1>
            
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">User Details</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('users.add_user') }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label fw-bold">Username</label>
                                <input type="text" class="form-control" id="username" name="username" 
                                       required placeholder="Enter username">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       required placeholder="Enter email">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       required placeholder="Enter password">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="role" class="form-label fw-bold">Role</label>
                                <select class="form-control" id="role" name="role">
                                    <option value="user">User</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="department" class="form-label fw-bold">Department</label>
                            <input type="text" class="form-control" id="department" name="department" 
                                   placeholder="Enter department">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Create User
                            </button>
                            <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
